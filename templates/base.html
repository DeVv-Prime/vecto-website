<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>{% block title %}{{ settings.site_name }} - Premium Cloud & Game Hosting{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: radial-gradient(circle at 20% 30%, #0a0a1a, #020208); color: #eef5ff; line-height: 1.5; overflow-x: hidden; min-height: 100vh; }
        @keyframes float { 0%,100% { transform: translateY(0px); } 50% { transform: translateY(-10px); } }
        @keyframes pulse-glow { 0%,100% { box-shadow: 0 0 5px rgba(99,102,241,0.5); } 50% { box-shadow: 0 0 25px rgba(99,102,241,0.8); } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes loadingProgress { 0% { width: 0%; } 100% { width: 100%; } }
        
        .glass { background: rgba(15,15,35,0.4); backdrop-filter: blur(12px); border: 1px solid rgba(99,102,241,0.2); border-radius: 24px; }
        .glass-card { background: rgba(20,20,45,0.5); backdrop-filter: blur(10px); border: 1px solid rgba(99,102,241,0.25); border-radius: 20px; transition: all 0.3s ease; animation: fadeInUp 0.6s ease-out; }
        .glass-card:hover { border-color: rgba(99,102,241,0.6); box-shadow: 0 8px 32px rgba(99,102,241,0.15); transform: translateY(-4px); }
        
        .btn-neon { background: linear-gradient(135deg, #6366f1, #a855f7); border: none; padding: 12px 28px; border-radius: 40px; font-weight: 600; color: white; cursor: pointer; transition: all 0.3s ease; text-decoration: none; display: inline-block; }
        .btn-neon:hover { transform: scale(1.05); box-shadow: 0 0 25px rgba(99,102,241,0.6), 0 0 40px rgba(168,85,247,0.4); }
        .btn-outline { background: transparent; border: 2px solid #6366f1; padding: 10px 26px; border-radius: 40px; font-weight: 600; color: #a5b4fc; cursor: pointer; transition: all 0.3s ease; text-decoration: none; display: inline-block; }
        .btn-outline:hover { background: rgba(99,102,241,0.2); border-color: #a855f7; box-shadow: 0 0 15px rgba(99,102,241,0.4); }
        .btn-danger { background: linear-gradient(135deg, #ef4444, #dc2626); border: none; padding: 12px 28px; border-radius: 40px; font-weight: 600; color: white; cursor: pointer; transition: all 0.3s ease; }
        .btn-danger:hover { transform: scale(1.05); box-shadow: 0 0 25px rgba(239,68,68,0.6); }
        .btn-success { background: linear-gradient(135deg, #10b981, #059669); border: none; padding: 12px 28px; border-radius: 40px; font-weight: 600; color: white; cursor: pointer; transition: all 0.3s ease; }
        .btn-success:hover { transform: scale(1.05); box-shadow: 0 0 25px rgba(16,185,129,0.6); }
        
        .input-modern { background: rgba(10,10,26,0.6); border: 1px solid rgba(99,102,241,0.3); border-radius: 12px; padding: 14px 18px; color: white; font-size: 1rem; transition: all 0.3s ease; width: 100%; }
        .input-modern:focus { outline: none; border-color: #a855f7; box-shadow: 0 0 15px rgba(168,85,247,0.3); }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: linear-gradient(135deg, rgba(20,20,45,0.95), rgba(10,10,30,0.95)); backdrop-filter: blur(20px); border: 1px solid rgba(99,102,241,0.3); border-radius: 24px; padding: 32px; max-width: 500px; width: 90%; animation: fadeInUp 0.3s ease; }
        
        .toast { position: fixed; bottom: 20px; right: 20px; background: linear-gradient(135deg, #10b981, #059669); color: white; padding: 12px 24px; border-radius: 12px; z-index: 1100; animation: fadeInUp 0.3s ease; }
        .toast-error { background: linear-gradient(135deg, #ef4444, #dc2626); }
        
        .spinner { width: 40px; height: 40px; border: 3px solid rgba(99,102,241,0.3); border-top-color: #6366f1; border-radius: 50%; animation: spin 1s linear infinite; }
        
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: rgba(10,10,26,0.5); border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: linear-gradient(135deg, #6366f1, #a855f7); border-radius: 10px; }
        
        .loading-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 20% 30%, #0a0a1a, #020208); display: flex; justify-content: center; align-items: center; z-index: 9999; transition: opacity 1s ease; flex-direction: column; }
        .loading-logo { font-size: 3rem; font-weight: 800; background: linear-gradient(135deg, #6366f1, #a855f7, #06b6d4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: pulse-glow 2s infinite; margin-bottom: 20px; }
        .loading-bar { width: 300px; height: 4px; background: rgba(99,102,241,0.2); border-radius: 4px; overflow: hidden; }
        .loading-progress { width: 0%; height: 100%; background: linear-gradient(90deg, #6366f1, #a855f7); animation: loadingProgress 2.5s ease-out forwards; }
        .loading-text { margin-top: 15px; color: #a5b4fc; font-size: 0.9rem; }
        
        @media (max-width: 768px) { .glass-card { margin: 10px; } .btn-neon, .btn-outline { padding: 8px 20px; font-size: 0.9rem; } .loading-bar { width: 250px; } }
        
        .badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 0.7rem; font-weight: 600; }
        .badge-success { background: rgba(16,185,129,0.2); color: #10b981; border: 1px solid rgba(16,185,129,0.3); }
        .badge-warning { background: rgba(245,158,11,0.2); color: #f59e0b; border: 1px solid rgba(245,158,11,0.3); }
        .badge-danger { background: rgba(239,68,68,0.2); color: #ef4444; border: 1px solid rgba(239,68,68,0.3); }
        .badge-info { background: rgba(59,130,246,0.2); color: #3b82f6; border: 1px solid rgba(59,130,246,0.3); }
        
        .stat-card { text-align: center; padding: 25px; }
        .stat-card i { font-size: 2.5rem; margin-bottom: 10px; display: block; }
        .stat-card h3 { font-size: 2rem; margin: 10px 0; }
        
        .plan-card { padding: 25px; position: relative; }
        .popular-badge { position: absolute; top: -12px; left: 50%; transform: translateX(-50%); background: linear-gradient(135deg, #a855f7, #6366f1); padding: 4px 16px; border-radius: 20px; font-size: 0.7rem; font-weight: 600; }
        
        .feature-list { list-style: none; margin: 15px 0; }
        .feature-list li { padding: 8px 0; border-bottom: 1px solid rgba(99,102,241,0.1); display: flex; align-items: center; gap: 10px; }
        .feature-list li i { width: 20px; color: #10b981; }
        
        .admin-sidebar { width: 280px; background: rgba(10,10,26,0.9); backdrop-filter: blur(10px); border-right: 1px solid rgba(99,102,241,0.2); padding: 30px 20px; min-height: 100vh; }
        .admin-sidebar nav { display: flex; flex-direction: column; gap: 8px; margin-top: 30px; }
        .admin-sidebar .nav-item { padding: 12px 16px; border-radius: 12px; color: #a5b4fc; text-decoration: none; transition: all 0.3s ease; display: flex; align-items: center; gap: 12px; }
        .admin-sidebar .nav-item:hover { background: rgba(99,102,241,0.2); color: white; }
        .admin-sidebar .nav-item.active { background: linear-gradient(135deg, rgba(99,102,241,0.3), rgba(168,85,247,0.3)); color: white; border-left: 3px solid #a855f7; }
        
        .admin-content { flex: 1; padding: 30px; overflow-x: auto; }
        
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid rgba(99,102,241,0.2); }
        th { color: #a5b4fc; font-weight: 600; }
        tr:hover { background: rgba(99,102,241,0.05); }
        
        .pricing-table { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; }
        .pricing-card { flex: 1; min-width: 280px; }
        
        .server-location { display: inline-flex; align-items: center; gap: 8px; background: rgba(99,102,241,0.1); padding: 6px 12px; border-radius: 20px; font-size: 0.8rem; }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <div id="loadingScreen" class="loading-screen">
        <div class="loading-logo">⚡ VECTŌ NODES ⚡</div>
        <div class="loading-bar"><div class="loading-progress"></div></div>
        <div class="loading-text" id="loadingText">Initializing secure infrastructure...</div>
    </div>
    
    {% block content %}{% endblock %}
    
    <script>
        const loadingMessages = [
            "🔄 Checking system infrastructure...",
            "🔒 Establishing secure connection...",
            "🌐 Loading server locations...",
            "⚙️ Configuring hosting environment...",
            "🔐 Verifying security protocols...",
            "💾 Loading user interface...",
            "✨ Almost ready...",
            "🚀 Opening VECTŌ NODES..."
        ];
        
        let msgIndex = 0;
        const loadingText = document.getElementById('loadingText');
        if (loadingText) {
            const interval = setInterval(() => {
                msgIndex = (msgIndex + 1) % loadingMessages.length;
                loadingText.textContent = loadingMessages[msgIndex];
            }, 800);
        }
        
        window.addEventListener('load', function() {
            setTimeout(function() {
                const loader = document.getElementById('loadingScreen');
                if (loader) {
                    loader.style.opacity = '0';
                    setTimeout(function() {
                        loader.style.display = 'none';
                    }, 1000);
                }
            }, 2500);
        });
        
        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = 'toast ' + (type === 'error' ? 'toast-error' : '');
            toast.innerHTML = '<i class="fas fa-' + (type === 'error' ? 'exclamation-circle' : 'check-circle') + '"></i> ' + message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        function showLoading(show) {
            let loader = document.getElementById('global-loader');
            if (show) {
                if (!loader) {
                    loader = document.createElement('div');
                    loader.id = 'global-loader';
                    loader.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:9999;display:flex;justify-content:center;align-items:center';
                    loader.innerHTML = '<div class="spinner"></div>';
                    document.body.appendChild(loader);
                }
            } else if (loader) { loader.remove(); }
        }
        
        async function apiCall(url, method, data) {
            showLoading(true);
            try {
                const response = await fetch(url, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: data ? JSON.stringify(data) : undefined
                });
                const result = await response.json();
                showLoading(false);
                return result;
            } catch (error) {
                showLoading(false);
                showToast('Network error: ' + error.message, 'error');
                return { success: false, message: error.message };
            }
        }
        
        async function logout() {
            await apiCall('/api/logout', 'POST', {});
            window.location.href = '/';
        }
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
