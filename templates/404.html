{% extends "base.html" %}
{% block title %}404 - Page Not Found{% endblock %}
{% block content %}
<div style="min-height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; padding: 20px;">
    <div>
        <div style="font-size: 8rem; font-weight: 800; background: linear-gradient(135deg, #6366f1, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">404</div>
        <h1 style="font-size: 2rem; margin: 20px 0;">Page Not Found</h1>
        <p style="color: #a5b4fc; margin-bottom: 30px;">The page you are looking for doesn't exist or has been moved.</p>
        <a href="/" class="btn-neon">Go Home →</a>
    </div>
</div>
{% endblock %}
