{% extends "base.html" %}
{% block title %}Login - {{ settings.site_name }}{% endblock %}
{% block content %}
<div style="min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;">
    <div class="glass-card" style="max-width: 450px; width: 100%; padding: 40px;">
        <div style="text-align: center; margin-bottom: 30px;">
            <div style="font-size: 3rem;">🔐</div>
            <h1 style="font-size: 2rem;">Welcome Back</h1>
            <p style="color: #a5b4fc;">Sign in to your account</p>
        </div>
        <form id="loginForm">
            <div style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 8px; font-size: 0.9rem;">Email Address</label>
                <input type="email" id="email" class="input-modern" placeholder="admin@vecto.co" required>
            </div>
            <div style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 8px; font-size: 0.9rem;">Password</label>
                <input type="password" id="password" class="input-modern" placeholder="••••••••" required>
            </div>
            <div style="display: flex; justify-content: space-between; margin-bottom: 25px;">
                <label style="display: flex; align-items: center; gap: 8px;">
                    <input type="checkbox" id="remember"> Remember me
                </label>
                <a href="/forgot-password" style="color: #a855f7; text-decoration: none;">Forgot password?</a>
            </div>
            <button type="submit" class="btn-neon" style="width: 100%;">Login →</button>
        </form>
        <p style="text-align: center; margin-top: 25px;">
            Don't have an account? <a href="/register" style="color: #a855f7; text-decoration: none;">Sign up</a>
        </p>
        <div style="margin-top: 20px; padding-top: 20px; border-top: 1px solid rgba(99,102,241,0.2); text-align: center; font-size: 0.85rem;">
            <p><span class="badge badge-info">Demo Account</span></p>
            <p>admin@vecto.co / admin123</p>
        </div>
    </div>
</div>
<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const result = await apiCall('/api/login', 'POST', {
        email: document.getElementById('email').value,
        password: document.getElementById('password').value,
        remember_me: document.getElementById('remember').checked
    });
    if (result.success) {
        showToast('Login successful! Redirecting...');
        setTimeout(() => { window.location.href = result.redirect; }, 1000);
    } else {
        showToast(result.message || 'Login failed', 'error');
    }
});
</script>
{% endblock %}
