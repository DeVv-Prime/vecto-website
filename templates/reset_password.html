{% extends "base.html" %}
{% block title %}Reset Password - {{ settings.site_name }}{% endblock %}
{% block content %}
<div style="min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;">
    <div class="glass-card" style="max-width: 450px; width: 100%; padding: 40px;">
        <div style="text-align: center; margin-bottom: 30px;">
            <div style="font-size: 3rem;">🔄</div>
            <h1 style="font-size: 2rem;">Set New Password</h1>
            <p style="color: #a5b4fc;">Create a new password for your account</p>
        </div>
        <form id="resetForm">
            <input type="hidden" id="token" value="{{ token }}">
            <div style="margin-bottom: 15px;">
                <label style="display: block; margin-bottom: 8px;">Email Address</label>
                <input type="email" id="email" class="input-modern" placeholder="user@example.com" required>
            </div>
            <div style="margin-bottom: 15px;">
                <label style="display: block; margin-bottom: 8px;">Temporary Password</label>
                <input type="text" id="temp_password" class="input-modern" placeholder="Received via email" required>
            </div>
            <div style="margin-bottom: 15px;">
                <label style="display: block; margin-bottom: 8px;">New Password</label>
                <input type="password" id="new_password" class="input-modern" placeholder="Min. 6 characters" required>
            </div>
            <div style="margin-bottom: 25px;">
                <label style="display: block; margin-bottom: 8px;">Confirm New Password</label>
                <input type="password" id="confirm_password" class="input-modern" placeholder="Confirm password" required>
            </div>
            <button type="submit" class="btn-neon" style="width: 100%;">Reset Password →</button>
        </form>
        <p style="text-align: center; margin-top: 25px;">
            <a href="/login" style="color: #a855f7; text-decoration: none;">← Back to Login</a>
        </p>
    </div>
</div>
<script>
document.getElementById('resetForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const newPass = document.getElementById('new_password').value;
    const confirm = document.getElementById('confirm_password').value;
    if (newPass !== confirm) { showToast('Passwords do not match', 'error'); return; }
    if (newPass.length < 6) { showToast('Password must be at least 6 characters', 'error'); return; }
    const result = await apiCall('/api/reset-password', 'POST', {
        email: document.getElementById('email').value,
        token: document.getElementById('token').value,
        temp_password: document.getElementById('temp_password').value,
        new_password: newPass,
        confirm_password: confirm
    });
    if (result.success) { showToast('Password reset successful!'); setTimeout(() => { window.location.href = '/login'; }, 1500); }
    else { showToast(result.message, 'error'); }
});
</script>
{% endblock %}
